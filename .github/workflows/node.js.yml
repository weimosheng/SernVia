name: Build SernVia

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

env:
  APP_NAME: sernvia

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 安装 Rust 工具链
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # 3. Rust 依赖缓存（加速后续构建）
      - name: Cache Rust cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # 4. 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 5. 安装 pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # 6. pnpm 依赖缓存
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # 7. 安装前端依赖
      - name: Install frontend dependencies
        run: pnpm install

      # 8. 构建应用（前端编译 + Rust 编译 + 打包）
      - name: Build Tauri app
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # 9. 上传 NSIS 安装包
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-nsis-installer
          path: src-tauri/target/release/bundle/nsis/*.exe

      # 10. 上传 MSI 安装包
      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-msi-installer
          path: src-tauri/target/release/bundle/msi/*.msi

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      # 1. 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 下载 NSIS 安装包
      - name: Download NSIS installer
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-nsis-installer
          path: ./artifacts/nsis

      # 3. 下载 MSI 安装包
      - name: Download MSI installer
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-msi-installer
          path: ./artifacts/msi

      # 4. 创建 GitHub Release 并上传产物
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/nsis/*.exe
            ./artifacts/msi/*.msi
          generate_release_notes: true
